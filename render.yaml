# Both engines are live-MongoDB-backed — no large model/data files to
# populate on the instance before this can serve traffic. A plain git-based
# deploy is sufficient.
services:
  - type: web
    name: zatch-hybrid-recommendation-engine
    env: python
    plan: starter
    buildCommand: python -m pip install --upgrade pip setuptools wheel && python -m pip install -r requirements.txt && python scripts/ensure_indexes.py || true
    startCommand: gunicorn app:app --workers 1 --worker-class gthread --threads 8 --timeout 180 --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: zatch
      - key: MONGO_TIMEOUT_MS
        value: "5000"
      - key: MONGO_MAX_POOL_SIZE
        value: "20"
      - key: ADMIN_API_KEY
        sync: false
      - key: API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: PRODUCT_CATALOG_CACHE_TTL_SECONDS
        value: "45"
      - key: ZATCH_CACHE_TTL_SECONDS
        value: "30"
      - key: ALLOWED_ORIGINS
        value: "*"
